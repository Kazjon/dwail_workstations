[project]
name = "dwail-agent"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "dwail-shared",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "pynvml>=11.5",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.14",
    "httpx>=0.27",
]

[project.scripts]
dwail-agent = "dwail_agent.main:run"
dwail-agent-install = "dwail_agent.install:main"
dwail-agent-update = "dwail_agent.update:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dwail_agent"]

[tool.uv.sources]
dwail-shared = { workspace = true }
