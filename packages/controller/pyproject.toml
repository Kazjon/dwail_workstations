[project]
name = "dwail-controller"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "dwail-shared",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "httpx>=0.27",
    "huggingface-hub>=0.23",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.14",
    "respx>=0.21",
    "httpx>=0.27",
]

[project.scripts]
dwail-controller = "dwail_controller.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dwail_controller"]

[tool.uv.sources]
dwail-shared = { workspace = true }
